{% extends "base.html" %}

{% block title %}Error · Hebrew Vocab Hub{% endblock %}

{% block main %}
<div style="padding: 2rem;">
    <h1 style="font-family: 'IBM Plex Mono'; font-size: 1rem;">
        Error {{ status_code }}
    </h1>

    <pre style="
        margin-top: 1rem;
        background: #fff;
        padding: 1rem;
        border: 1px solid #e0e0e0;
        font-size: 0.75rem;
        overflow: auto;
        color: #444;
    ">
{{ detail }}
    </pre>

    <a href="/" style="display:inline-block;margin-top:1rem;color:#888;">
        ← back home
    </a>
</div>
{% endblock %}
